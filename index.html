<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S.</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22JARVIS%22,%22display%22:%22standalone%22}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #060b14;
    --panel: #0c1620;
    --panel-border: #17323d;
    --cyan: #4fe3ff;
    --cyan-dim: #1e5f73;
    --amber: #ff9e4a;
    --text: #e3f6ff;
    --text-dim: #5f8494;
    --danger: #ff5f5f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:'Share Tech Mono', monospace; overflow-x:hidden;}
  body{
    background-image:
      radial-gradient(circle at 50% -10%, rgba(79,227,255,0.08), transparent 60%),
      repeating-linear-gradient(0deg, rgba(79,227,255,0.02) 0px, rgba(79,227,255,0.02) 1px, transparent 1px, transparent 3px);
    min-height:100vh;
    padding: max(20px, env(safe-area-inset-top)) 16px 32px;
  }
  .frame{
    max-width:480px; margin:0 auto;
  }

  /* corner-bracket panel */
  .panel{
    position:relative; background:linear-gradient(180deg, var(--panel), #081019);
    border:1px solid var(--panel-border);
    padding:18px 18px 16px;
    margin-bottom:14px;
    clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
  }
  .panel::before, .panel::after{
    content:""; position:absolute; width:14px; height:14px; pointer-events:none;
  }
  .panel::before{top:-1px; left:-1px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan);}
  .panel::after{bottom:-1px; right:-1px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan);}

  .eyebrow{
    font-family:'Orbitron', sans-serif; font-size:11px; letter-spacing:3px;
    color:var(--cyan); text-transform:uppercase; margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow .line{flex:1; height:1px; background:linear-gradient(90deg, var(--cyan-dim), transparent);}

  /* header / status */
  .status-row{
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; color:var(--text-dim); letter-spacing:2px; margin-bottom:18px;
    padding:0 4px;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--cyan); display:inline-block;
    box-shadow:0 0 8px var(--cyan); animation:pulse 1.6s ease-in-out infinite; margin-right:6px;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

  /* central clock ring */
  .core{
    position:relative; width:220px; height:220px; margin:10px auto 18px;
    display:flex; align-items:center; justify-content:center;
  }
  .ring{position:absolute; inset:0; border-radius:50%; border:1px solid var(--cyan-dim);}
  .ring.r1{animation:spin 18s linear infinite; border-top-color:var(--cyan); border-style:dashed;}
  .ring.r2{inset:16px; animation:spin 12s linear infinite reverse; border-right-color:var(--cyan);}
  .ring.r3{inset:32px; border:1px solid var(--panel-border);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .clock-txt{text-align:center; z-index:2;}
  .clock-txt .time{font-family:'Orbitron', sans-serif; font-size:38px; font-weight:700; color:var(--text); letter-spacing:2px;}
  .clock-txt .date{font-size:12px; color:var(--cyan); letter-spacing:2px; margin-top:4px; text-transform:uppercase;}

  .greeting{text-align:center; font-size:13px; color:var(--text-dim); margin-bottom:20px; letter-spacing:1px;}
  .greeting b{color:var(--amber);}

  /* weather */
  .weather-main{display:flex; align-items:baseline; gap:14px;}
  .weather-temp{font-family:'Orbitron', sans-serif; font-size:42px; color:var(--cyan); font-weight:700;}
  .weather-desc{font-size:13px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;}
  .weather-loc{font-size:12px; color:var(--text); margin-top:2px;}
  .weather-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px; font-size:11px;}
  .weather-grid div{color:var(--text-dim); letter-spacing:1px;}
  .weather-grid b{color:var(--text); font-weight:400;}
  .loc-btn{
    background:none; border:1px solid var(--cyan-dim); color:var(--cyan);
    font-family:'Share Tech Mono', monospace; font-size:11px; letter-spacing:1px;
    padding:6px 10px; margin-top:14px; cursor:pointer; text-transform:uppercase;
  }
  .loc-btn:active{background:rgba(79,227,255,0.1);}

  /* tasks */
  .task-input-row{display:flex; gap:8px; margin-bottom:12px;}
  .task-input-row input{
    flex:1; background:#081019; border:1px solid var(--panel-border); color:var(--text);
    font-family:'Share Tech Mono', monospace; font-size:13px; padding:10px; outline:none;
  }
  .task-input-row input:focus{border-color:var(--cyan);}
  .task-input-row button{
    background:var(--cyan); border:none; color:#03141c; font-family:'Orbitron',sans-serif;
    font-weight:700; font-size:16px; width:42px; cursor:pointer;
  }
  .task-list{list-style:none; margin:0; padding:0;}
  .task-list li{
    display:flex; align-items:center; gap:10px; padding:9px 4px;
    border-bottom:1px solid var(--panel-border); font-size:13px;
  }
  .task-list li .chk{
    width:16px; height:16px; border:1px solid var(--cyan-dim); flex-shrink:0; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:var(--cyan); font-size:11px;
  }
  .task-list li.done .chk{background:var(--cyan); color:#03141c;}
  .task-list li.done span{text-decoration:line-through; color:var(--text-dim);}
  .task-list li span{flex:1;}
  .task-list li .del{color:var(--danger); cursor:pointer; font-size:11px; opacity:0.7;}
  .task-empty{color:var(--text-dim); font-size:12px; text-align:center; padding:14px 0;}

  /* expenses */
  .expense-total{
    display:flex; justify-content:space-between; align-items:baseline;
    padding-bottom:12px; margin-bottom:12px; border-bottom:1px solid var(--panel-border);
    font-size:11px; color:var(--text-dim); letter-spacing:2px;
  }
  .expense-total b{font-family:'Orbitron', sans-serif; font-size:20px; color:var(--amber); letter-spacing:1px;}
  #expense-val{
    background:#081019; border:1px solid var(--panel-border); color:var(--text);
    font-family:'Share Tech Mono', monospace; font-size:13px; padding:10px; outline:none;
  }
  #expense-val:focus{border-color:var(--cyan);}

  /* news */
  .news-item{padding:10px 0; border-bottom:1px solid var(--panel-border);}
  .news-item:last-child{border-bottom:none;}
  .news-item a{color:var(--text); text-decoration:none; font-size:13px; line-height:1.5;}
  .news-item a:active{color:var(--cyan);}
  .news-src{color:var(--cyan); font-size:10px; letter-spacing:1px; text-transform:uppercase; margin-top:3px; display:block;}
  .news-loading, .news-error{color:var(--text-dim); font-size:12px; text-align:center; padding:10px 0;}

  ::selection{background:var(--cyan); color:#03141c;}

  /* voice */
  .voice-wrap{display:flex; flex-direction:column; align-items:center; margin-bottom:22px;}
  .mic-btn{
    width:64px; height:64px; border-radius:50%; background:radial-gradient(circle, #0d2530, #081019);
    border:1px solid var(--cyan-dim); color:var(--cyan); display:flex; align-items:center; justify-content:center;
    cursor:pointer; position:relative; transition:box-shadow 0.2s, border-color 0.2s;
  }
  .mic-btn:active{transform:scale(0.96);}
  .mic-btn.listening{border-color:var(--cyan); box-shadow:0 0 0 0 rgba(79,227,255,0.5); animation:mic-pulse 1.2s ease-out infinite;}
  .mic-btn.speaking{border-color:var(--amber); color:var(--amber);}
  @keyframes mic-pulse{
    0%{box-shadow:0 0 0 0 rgba(79,227,255,0.45);}
    100%{box-shadow:0 0 0 22px rgba(79,227,255,0);}
  }
  .mic-label{font-size:10px; letter-spacing:2px; color:var(--text-dim); margin-top:8px;}
  .voice-reply{
    max-width:340px; text-align:center; font-size:12px; color:var(--cyan);
    margin-top:10px; min-height:14px; line-height:1.5; letter-spacing:0.5px;
  }
</style>
</head>
<body>
<div class="frame">

  <div class="status-row">
    <div><span class="dot"></span>SISTEMA ONLINE</div>
    <div id="battery-txt">J.A.R.V.I.S. v1.0</div>
  </div>

  <div class="core">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="clock-txt">
      <div class="time" id="clock">--:--</div>
      <div class="date" id="date">-- --- ----</div>
    </div>
  </div>

  <div class="greeting" id="greeting">Inicializando sistemas...</div>

  <div class="voice-wrap">
    <button id="mic-btn" class="mic-btn">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="9" y="2" width="6" height="12" rx="3"></rect>
        <path d="M5 10a7 7 0 0 0 14 0"></path>
        <line x1="12" y1="19" x2="12" y2="22"></line>
      </svg>
    </button>
    <div class="mic-label" id="mic-label">TOQUE E FALE</div>
    <div class="voice-reply" id="voice-reply"></div>
  </div>

  <div class="panel">
    <div class="eyebrow">CLIMA<span class="line"></span></div>
    <div id="weather-body">
      <div class="news-loading">Aguardando permissão de localização...</div>
    </div>
    <button class="loc-btn" id="loc-btn">📍 Usar minha localização</button>
  </div>

  <div class="panel">
    <div class="eyebrow">TAREFAS<span class="line"></span></div>
    <div class="task-input-row">
      <input type="text" id="task-input" placeholder="Nova diretiva..." maxlength="80">
      <button id="task-add">+</button>
    </div>
    <ul class="task-list" id="task-list"></ul>
  </div>

  <div class="panel">
    <div class="eyebrow">DESPESAS<span class="line"></span></div>
    <div class="expense-total">
      <span>TOTAL GASTO</span>
      <b id="expense-total-val">R$ 0,00</b>
    </div>
    <div class="task-input-row">
      <input type="text" id="expense-desc" placeholder="Descrição..." maxlength="60" style="flex:2">
      <input type="number" id="expense-val" placeholder="R$" inputmode="decimal" style="flex:1">
      <button id="expense-add">+</button>
    </div>
    <ul class="task-list" id="expense-list"></ul>
  </div>

  <div class="panel">
    <div class="eyebrow">NOTÍCIAS<span class="line"></span></div>
    <div id="news-body"><div class="news-loading">Carregando feed...</div></div>
  </div>

</div>

<script>
// ---------- Clock ----------
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  const dias = ['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
  const meses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  document.getElementById('date').textContent =
    `${dias[now.getDay()]} ${String(now.getDate()).padStart(2,'0')} ${meses[now.getMonth()]} ${now.getFullYear()}`;

  const hr = now.getHours();
  let greet = 'Boa noite';
  if(hr >= 5 && hr < 12) greet = 'Bom dia';
  else if(hr >= 12 && hr < 18) greet = 'Boa tarde';
  const newGreet = `${greet}, senhor.`;
  const greetEl = document.getElementById('greeting');
  if(greetEl.dataset.text !== newGreet){
    greetEl.dataset.text = newGreet;
    greetEl.textContent = newGreet;
  }
}
updateClock();
setInterval(updateClock, 1000);

// ---------- Weather (Open-Meteo, no key needed) ----------
const weatherCodes = {
  0:'Céu limpo',1:'Poucas nuvens',2:'Parc. nublado',3:'Nublado',
  45:'Neblina',48:'Neblina gelada',51:'Garoa leve',53:'Garoa',55:'Garoa forte',
  61:'Chuva leve',63:'Chuva',65:'Chuva forte',71:'Neve leve',73:'Neve',75:'Neve forte',
  80:'Pancadas de chuva',81:'Pancadas fortes',82:'Pancadas violentas',
  95:'Tempestade',96:'Tempestade c/ granizo'
};

async function loadWeather(lat, lon, label){
  const body = document.getElementById('weather-body');
  body.innerHTML = '<div class="news-loading">Consultando satélite...</div>';
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`;
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;
    const desc = weatherCodes[c.weather_code] || 'Condição desconhecida';
    body.innerHTML = `
      <div class="weather-main">
        <div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
        <div>
          <div class="weather-desc">${desc}</div>
          <div class="weather-loc">${label}</div>
        </div>
      </div>
      <div class="weather-grid">
        <div>UMIDADE <b>${c.relative_humidity_2m}%</b></div>
        <div>VENTO <b>${Math.round(c.wind_speed_10m)} km/h</b></div>
      </div>
    `;
    try{ await window.storage.set('last-location', JSON.stringify({lat,lon,label})); }catch(e){}
  }catch(e){
    body.innerHTML = '<div class="news-error">Falha ao obter dados climáticos.</div>';
  }
}

async function getCityName(lat, lon){
  try{
    const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=pt`;
    const res = await fetch(url);
    const data = await res.json();
    const city = data.city || data.locality || data.principalSubdivision;
    if(!city) return null;
    return data.principalSubdivision && data.principalSubdivision !== city
      ? `${city}, ${data.principalSubdivisionCode ? data.principalSubdivisionCode.split('-').pop() : data.principalSubdivision}`
      : city;
  }catch(e){ return null; }
}

async function loadWeatherWithCity(lat, lon){
  loadWeather(lat, lon, 'Localizando cidade...');
  const city = await getCityName(lat, lon);
  loadWeather(lat, lon, city || 'Sua localização');
}

function requestLocation(){
  const body = document.getElementById('weather-body');
  if(!navigator.geolocation){
    body.innerHTML = '<div class="news-error">Geolocalização não suportada neste navegador.</div>';
    return;
  }
  body.innerHTML = '<div class="news-loading">Localizando...</div>';
  navigator.geolocation.getCurrentPosition(
    pos => loadWeatherWithCity(pos.coords.latitude.toFixed(2), pos.coords.longitude.toFixed(2)),
    (err) => {
      let msg = 'Não foi possível obter sua localização.';
      if(err.code === 1) msg = 'Permissão de localização negada. Ative nas configurações do navegador e toque no botão abaixo.';
      body.innerHTML = `<div class="news-error">${msg}</div>`;
    },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

document.getElementById('loc-btn').addEventListener('click', requestLocation);

// on load: use last saved location as instant fallback, then always refresh with a live GPS fix
(async () => {
  let hadCached = false;
  try{
    const r = await window.storage.get('last-location');
    if(r && r.value){
      const loc = JSON.parse(r.value);
      loadWeather(loc.lat, loc.lon, loc.label);
      hadCached = true;
    }
  }catch(e){}
  if(!hadCached){
    requestLocation();
  } else if(navigator.geolocation){
    // refresh silently in the background with the real current position
    navigator.geolocation.getCurrentPosition(
      pos => loadWeatherWithCity(pos.coords.latitude.toFixed(2), pos.coords.longitude.toFixed(2)),
      () => {}, // keep cached result if this fails silently
      { enableHighAccuracy:true, timeout:10000 }
    );
  }
})();

// ---------- Tasks ----------
let tasks = [];
const taskListEl = document.getElementById('task-list');

function renderTasks(){
  if(tasks.length === 0){
    taskListEl.innerHTML = '<div class="task-empty">Nenhuma diretiva pendente.</div>';
    return;
  }
  taskListEl.innerHTML = tasks.map((t, i) => `
    <li class="${t.done ? 'done' : ''}" data-i="${i}">
      <span class="chk">${t.done ? '✓' : ''}</span>
      <span>${t.text}</span>
      <span class="del">✕</span>
    </li>
  `).join('');
}

async function saveTasks(){
  try{ await window.storage.set('tasks', JSON.stringify(tasks)); }catch(e){}
}

taskListEl.addEventListener('click', (e) => {
  const li = e.target.closest('li');
  if(!li) return;
  const i = parseInt(li.dataset.i);
  if(e.target.classList.contains('del')){
    tasks.splice(i,1);
  } else {
    tasks[i].done = !tasks[i].done;
  }
  renderTasks();
  saveTasks();
});

function addTask(){
  const input = document.getElementById('task-input');
  const val = input.value.trim();
  if(!val) return;
  tasks.push({text: val, done: false});
  input.value = '';
  renderTasks();
  saveTasks();
}
document.getElementById('task-add').addEventListener('click', addTask);
document.getElementById('task-input').addEventListener('keydown', e => { if(e.key === 'Enter') addTask(); });

(async () => {
  try{
    const r = await window.storage.get('tasks');
    if(r && r.value) tasks = JSON.parse(r.value);
  }catch(e){}
  renderTasks();
})();

// ---------- Expenses ----------
let expenses = [];
const expenseListEl = document.getElementById('expense-list');
const expenseTotalEl = document.getElementById('expense-total-val');

function fmtBRL(n){
  return 'R$ ' + n.toFixed(2).replace('.', ',');
}

function renderExpenses(){
  const total = expenses.reduce((s,e) => s + e.value, 0);
  expenseTotalEl.textContent = fmtBRL(total);
  if(expenses.length === 0){
    expenseListEl.innerHTML = '<div class="task-empty">Nenhuma despesa registrada.</div>';
    return;
  }
  expenseListEl.innerHTML = expenses.map((e, i) => `
    <li data-i="${i}">
      <span>${e.desc}</span>
      <span style="color:var(--amber); flex:none;">${fmtBRL(e.value)}</span>
      <span class="del">✕</span>
    </li>
  `).join('');
}

async function saveExpenses(){
  try{ await window.storage.set('expenses', JSON.stringify(expenses)); }catch(e){}
}

function addExpense(desc, value){
  if(!desc || !value || isNaN(value) || value <= 0) return false;
  expenses.unshift({ desc: desc.charAt(0).toUpperCase()+desc.slice(1), value: Math.round(value*100)/100 });
  renderExpenses();
  saveExpenses();
  return true;
}

expenseListEl.addEventListener('click', (e) => {
  const li = e.target.closest('li');
  if(!li || !e.target.classList.contains('del')) return;
  const i = parseInt(li.dataset.i);
  expenses.splice(i,1);
  renderExpenses();
  saveExpenses();
});

document.getElementById('expense-add').addEventListener('click', () => {
  const descInput = document.getElementById('expense-desc');
  const valInput = document.getElementById('expense-val');
  if(addExpense(descInput.value.trim(), parseFloat(valInput.value))){
    descInput.value = '';
    valInput.value = '';
  }
});
document.getElementById('expense-val').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('expense-add').click();
});

(async () => {
  try{
    const r = await window.storage.get('expenses');
    if(r && r.value) expenses = JSON.parse(r.value);
  }catch(e){}
  renderExpenses();
})();

// ---------- News ----------
async function loadNews(){
  const body = document.getElementById('news-body');
  try{
    const feed = 'https://g1.globo.com/rss/g1/';
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}&count=5`;
    const res = await fetch(url);
    const data = await res.json();
    if(data.status !== 'ok' || !data.items || data.items.length === 0){
      throw new Error('empty');
    }
    body.innerHTML = data.items.slice(0,5).map(item => `
      <div class="news-item">
        <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
        <span class="news-src">G1</span>
      </div>
    `).join('');
  }catch(e){
    body.innerHTML = '<div class="news-error">Feed de notícias indisponível no momento.</div>';
  }
}
loadNews();

// ---------- Voice: speech recognition (input) + speech sy
